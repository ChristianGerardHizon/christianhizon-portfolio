name: gym_system
description: "A template application"

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  cross_file: ^0.3.4+2 
  cupertino_icons: ^1.0.8 
  flutter:
    sdk: flutter
  flutter_form_builder: ^9.5.0 
  flutter_hooks: ^0.20.5 
  flutter_secure_storage: ^9.2.2 
  flutter_typeahead: ^5.2.0 
  form_builder_extra_fields: ^11.0.0 
  form_builder_file_picker: ^4.2.0 
  form_builder_image_picker: ^4.1.0 
  form_builder_validators: ^11.0.0 
  fpdart: ^1.1.0 
  go_router: ^14.4.1 
  go_router_builder: ^2.7.1 
  hooks_riverpod: ^2.6.1 
  material_design_icons_flutter: ^7.0.7296 
  pretty_dio_logger: ^1.4.0 
  riverpod_annotation: ^2.6.1 
  window_manager: ^0.4.3 
  dart_mappable: ^4.3.0 
  searchfield: ^1.1.7 
  flutter_image_compress: ^2.3.0 
  image_picker: ^1.1.2 
  path_provider: ^2.1.5 
  intl: ^0.19.0 
  file_picker: ^8.1.3 
  cached_network_image: ^3.4.1
  mask_text_input_formatter: ^2.9.0
  flutter_date_range_picker: ^0.1.1
  responsive_builder: ^0.7.1
  pocketbase: ^0.19.1
  http: ^1.2.2
  flutter_side_menu: ^0.5.41
  package_info_plus: ^8.1.2
  form_builder: ^1.0.1

dev_dependencies:
  dart_mappable_builder: ^4.3.0  
  riverpod_generator: ^2.6.2
  riverpod_lint: ^2.6.2
  json_serializable: ^6.8.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_gen_runner: ^5.8.0 
  custom_lint: ^0.7.0
  change_app_package_name: ^1.4.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_gen:
  output: lib/src/core/assets/
  line_length: 80

scripts:
  pre-build: version update-pubspec

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon.png"


  
  
  
  
  
