package_rename_config:
  android:
    app_name: Christian Hizon # (String) The display name of the android app
    package_name: com.hznsystems.christianhizon # (String) The package name of the android app

  ios:
    app_name: Christian Hizon # (String) The display name of the ios app
    bundle_name: com.hznsystems.christianhizon # (String) The bundle name of the ios app
    package_name: com.hznsystems.christianhizon # (String) The product bundle identifier of the ios app

  linux:
    app_name: Christian Hizon # (String) The window title of the linux app
    package_name: com.hznsystems.christianhizon # (String) The application id of the linux app
    exe_name: christianhizon # (String) The executable name (binary name) of the linux app

  macos:
    app_name: Christian Hizon # (String) The product name of the macos app
    package_name: com.hznsystems.christianhizon # (String) The product bundle identifier of the macos app
    copyright_notice: Christian Hizon # (String) The product copyright of the macos app

  web:
    app_name: Christian Hizon # (String) The title of the web app and PWA
    short_app_name: Christian Hizon # (String) The short display name of the PWA (Optional, defaults to app_name if not set)
    description: Christian Hizon # (String) The description of the web app and PWA

  windows:
    app_name: Christian Hizon # (String) The window title & software name of the windows app
    organization: Christian Hizon # (String) The organization name (company name) of the windows app
    copyright_notice: Christian Hizon # (String) The legal copyright of the windows app
    exe_name: christianhizon # (String) The executable name (binary name) of the windows app
