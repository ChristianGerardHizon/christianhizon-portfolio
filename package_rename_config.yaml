package_rename_config:
  android:
    app_name: SannJoseVet # (String) The display name of the android app
    package_name: com.it2do.dev # (String) The package name of the android app

  ios:
    app_name: SannJoseVet # (String) The display name of the ios app
    bundle_name: com.2doit.dev # (String) The bundle name of the ios app
    package_name: com.2doit.dev # (String) The product bundle identifier of the ios app

  linux:
    app_name: SannJoseVet # (String) The window title of the linux app
    package_name: com.it2do.dev # (String) The application id of the linux app
    exe_name: SannJoseVet # (String) The executable name (binary name) of the linux app

  macos:
    app_name: SannJoseVet # (String) The product name of the macos app
    package_name: com.it2do.dev # (String) The product bundle identifier of the macos app
    copyright_notice: com.it2do.dev # (String) The product copyright of the macos app

  web:
    app_name: SannJoseVet # (String) The title of the web app and PWA
    short_app_name: SannJoseVet # (String) The short display name of the PWA (Optional, defaults to app_name if not set)
    description: SannJoseVet # (String) The description of the web app and PWA

  windows:
    app_name: SannJoseVet # (String) The window title & software name of the windows app
    organization: 2doit # (String) The organization name (company name) of the windows app
    copyright_notice: 2doit # (String) The legal copyright of the windows app
    exe_name: SannJoseVet # (String) The executable name (binary name) of the windows app