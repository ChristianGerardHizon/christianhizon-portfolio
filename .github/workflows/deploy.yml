name: Deploy System

on:
  push:
    branches: [ "staging" ]
  pull_request:
    types: [ closed ]
    branches: [ "main" ]

permissions:
  contents: write # REQUIRED for creating GitHub Releases

jobs:
  # ==========================================
  # JOB 1: STAGING TRACK
  # ==========================================
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- OPTIMIZATION START ---
      # 1. Setup Java 17 with Gradle Cache
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 2. Setup Flutter with SDK Cache
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. Cache Pub Dependencies
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache/hosted
            ~/.pub-cache/git
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
          
      - run: flutter pub get
      # --- OPTIMIZATION END ---

      # 4. ROBUST VERSION CALCULATION
      - name: Calculate Staging Version
        id: calc_staging
        env: 
          URL: ${{ secrets.VERSION_MANAGER_URL }}
          ID: ${{ secrets.VERSION_COLLECTION_ID }}
        run: |
          # Safety Check
          if [ -z "$URL" ] || [ -z "$ID" ]; then
            echo "::error::Secrets VERSION_MANAGER_URL or VERSION_COLLECTION_ID are missing!"
            exit 1
          fi

          if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
          
          # Fetch
          RESPONSE=$(curl -s "$URL/$ID")
          
          # Parse
          MAJOR=$(echo $RESPONSE | jq -r '.major')
          MINOR=$(echo $RESPONSE | jq -r '.minor')
          PATCH=$(echo $RESPONSE | jq -r '.patch')

          if [ "$MAJOR" == "null" ]; then
             echo "::error::Failed to parse version. Response: $RESPONSE"
             exit 1
          fi

          # Logic: Staging is Next Patch
          NEXT_PATCH=$((PATCH + 1))
          STAGING_VER="$MAJOR.$MINOR.$NEXT_PATCH-staging"
          
          echo "STAGING_VER=$STAGING_VER" >> $GITHUB_ENV
          echo "Calculated Staging Version: $STAGING_VER"

      # 5. BUILD WEB & APK (Using ENV=staging)
      - name: Build Web
        run: flutter build web --release --build-name=${{ env.STAGING_VER }} --dart-define=ENV=staging --dart-define=API_URL=${{ secrets.POCKETBASE_URL_STAGING }}

      - name: Build APK (Debug)
        run: flutter build apk --debug --build-name=${{ env.STAGING_VER }} --dart-define=ENV=staging --dart-define=API_URL=${{ secrets.POCKETBASE_URL_STAGING }}

      # 6. RENAME (Prepare for push)
      - name: Prepare Folder
        run: mv build/web pb_public

      # 7. PUSH TO SERVER REPO (STAGING BRANCH)
      - name: Deploy to Server Staging
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_PAT }}
        with:
          source-directory: 'pb_public'
          destination-github-username: 'YOUR_GITHUB_USERNAME' # <--- CHANGE THIS
          destination-repository-name: 'sanjose_server'     # <--- CHANGE THIS
          target-branch: 'staging'
          target-directory: 'pb_public'
          create-target-branch-if-needed: true
          commit-message: "Deploy Staging: ${{ env.STAGING_VER }}"
          user-email: 'bot@gymsystem.com'

  # ==========================================
  # JOB 2: PRODUCTION TRACK
  # ==========================================
  deploy-production:
    if: github.event.pull_request.merged == true && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: Production # <--- TRIGGERS MANUAL APPROVAL
    outputs:
      prod_ver: ${{ steps.calc_prod.outputs.prod_ver }}
      new_patch: ${{ steps.calc_prod.outputs.new_patch }}

    steps:
      - uses: actions/checkout@v4

      # --- OPTIMIZATION START ---
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache/hosted
            ~/.pub-cache/git
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
          
      - run: flutter pub get
      # --- OPTIMIZATION END ---

      # 1. ROBUST VERSION CALCULATION
      - name: Calculate Prod Version
        id: calc_prod
        env: 
          URL: ${{ secrets.VERSION_MANAGER_URL }}
          ID: ${{ secrets.VERSION_COLLECTION_ID }}
        run: |
          if [ -z "$URL" ] || [ -z "$ID" ]; then
            echo "::error::Secrets Missing!"
            exit 1
          fi

          if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
          
          RESPONSE=$(curl -s "$URL/$ID")
          MAJOR=$(echo $RESPONSE | jq -r '.major')
          MINOR=$(echo $RESPONSE | jq -r '.minor')
          PATCH=$(echo $RESPONSE | jq -r '.patch')

          if [ "$MAJOR" == "null" ]; then exit 1; fi

          # Logic: Increment Patch for Prod
          NEW_PATCH=$((PATCH + 1))
          PROD_VER="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "PROD_VER=$PROD_VER" >> $GITHUB_ENV
          echo "prod_ver=$PROD_VER" >> $GITHUB_OUTPUT
          echo "new_patch=$NEW_PATCH" >> $GITHUB_OUTPUT

      # 2. BUILD WEB & APK (Using ENV=prod)
      - name: Build Web
        run: flutter build web --release --build-name=${{ env.PROD_VER }} --dart-define=ENV=prod --dart-define=API_URL=${{ secrets.POCKETBASE_URL_PROD }}

      - name: Build APK (Debug)
        run: flutter build apk --debug --build-name=${{ env.PROD_VER }} --dart-define=ENV=prod --dart-define=API_URL=${{ secrets.POCKETBASE_URL_PROD }}

      # 3. Save APK for Release Job
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      # 4. RENAME
      - name: Prepare Folder
        run: mv build/web pb_public

      # 5. PUSH TO SERVER REPO (MAIN BRANCH)
      - name: Deploy to Server Main
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_PAT }}
        with:
          source-directory: 'pb_public'
          destination-github-username: 'YOUR_GITHUB_USERNAME' # <--- CHANGE THIS
          destination-repository-name: 'sanjose_server'     # <--- CHANGE THIS
          target-branch: 'main'
          target-directory: 'pb_public'
          commit-message: "Deploy Production: ${{ env.PROD_VER }}"
          user-email: 'bot@gymsystem.com'

  # ==========================================
  # JOB 3: RELEASE & SYNC
  # ==========================================
  release-and-sync:
    needs: deploy-production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.deploy-production.outputs.prod_ver }}
          files: app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update Version Manager
        env:
          NEW_PATCH: ${{ needs.deploy-production.outputs.new_patch }}
          URL: ${{ secrets.VERSION_MANAGER_URL }}
          ID: ${{ secrets.VERSION_COLLECTION_ID }}
          TOKEN: ${{ secrets.PB_TOKEN }}
        run: |
           if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
           
           # Re-fetch for Major/Minor
           RESPONSE=$(curl -s "$URL/$ID")
           MAJOR=$(echo $RESPONSE | jq -r '.major')
           MINOR=$(echo $RESPONSE | jq -r '.minor')
           
           # Payload
           PAYLOAD=$(jq -n --argjson major "$MAJOR" --argjson minor "$MINOR" --argjson patch "$NEW_PATCH" \
             '{major: $major, minor: $minor, patch: $patch}')
           
           # Update (Supports Auth if token is present)
           if [ -z "$TOKEN" ]; then
              curl -s -X PATCH "$URL/$ID" -H "Content-Type: application/json" -d "$PAYLOAD"
           else
              curl -s -X PATCH "$URL/$ID" -H "Content-Type: application/json" -H "Authorization: $TOKEN" -d "$PAYLOAD"
           fi