name: Deploy Parallel Branches

on:
  push:
    branches: [ "staging" ]
  pull_request:
    types: [ closed ]
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  # ==========================================
  # STAGING TRACK
  # ==========================================
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. Calculate Version
      - name: Calculate Staging Version
        id: calc_staging
        run: |
          if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
          RESPONSE=$(curl -s ${{ secrets.VERSION_MANAGER_URL }}/${{ secrets.VERSION_COLLECTION_ID }})
          MAJOR=$(echo $RESPONSE | jq -r '.major')
          MINOR=$(echo $RESPONSE | jq -r '.minor')
          PATCH=$(echo $RESPONSE | jq -r '.patch')
          NEXT_PATCH=$((PATCH + 1))
          STAGING_VER="$MAJOR.$MINOR.$NEXT_PATCH-staging"
          echo "STAGING_VER=$STAGING_VER" >> $GITHUB_ENV

      # 2. Build Web & APK
      - name: Build Web
        run: flutter build web --release --build-name=${{ env.STAGING_VER }} --dart-define=API_URL=${{ secrets.POCKETBASE_URL_STAGING }}

      - name: Build APK (Debug)
        run: flutter build apk --debug --build-name=${{ env.STAGING_VER }} --dart-define=API_URL=${{ secrets.POCKETBASE_URL_STAGING }}

      # 3. RENAME to Standard 'pb_public'
      # Since we are pushing to a separate branch, we don't need a unique name like 'pb_public_staging'
      - name: Prepare Folder
        run: mv build/web pb_public

      # 4. PUSH TO SERVER REPO -> STAGING BRANCH
      - name: Deploy to Server Staging
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_PAT }}
        with:
          source-directory: 'pb_public'
          destination-github-username: 'YOUR_GITHUB_USER'
          destination-repository-name: 'sanjose_server'
          target-branch: 'staging'   # <--- PUSHES TO STAGING
          target-directory: 'pb_public'
          create-target-branch-if-needed: true
          commit-message: "Deploy Staging: ${{ env.STAGING_VER }}"
          user-email: 'bot@gymsystem.com'

  # ==========================================
  # PRODUCTION TRACK
  # ==========================================
  deploy-production:
    if: github.event.pull_request.merged == true && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      prod_ver: ${{ steps.calc_prod.outputs.prod_ver }}
      new_patch: ${{ steps.calc_prod.outputs.new_patch }}

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2

      # 1. Calculate Prod Version
      - name: Calculate Prod Version
        id: calc_prod
        run: |
          if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
          RESPONSE=$(curl -s ${{ secrets.VERSION_MANAGER_URL }}/${{ secrets.VERSION_COLLECTION_ID }})
          MAJOR=$(echo $RESPONSE | jq -r '.major')
          MINOR=$(echo $RESPONSE | jq -r '.minor')
          PATCH=$(echo $RESPONSE | jq -r '.patch')
          NEW_PATCH=$((PATCH + 1))
          PROD_VER="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "PROD_VER=$PROD_VER" >> $GITHUB_ENV
          echo "prod_ver=$PROD_VER" >> $GITHUB_OUTPUT
          echo "new_patch=$NEW_PATCH" >> $GITHUB_OUTPUT

      # 2. Build Web & APK
      - name: Build Web
        run: flutter build web --release --build-name=${{ env.PROD_VER }} --dart-define=API_URL=${{ secrets.POCKETBASE_URL_PROD }}

      - name: Build APK (Debug)
        run: flutter build apk --debug --build-name=${{ env.PROD_VER }} --dart-define=API_URL=${{ secrets.POCKETBASE_URL_PROD }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      # 3. RENAME
      - name: Prepare Folder
        run: mv build/web pb_public

      # 4. PUSH TO SERVER REPO -> MAIN BRANCH
      - name: Deploy to Server Main
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_PAT }}
        with:
          source-directory: 'pb_public'
          destination-github-username: 'YOUR_GITHUB_USER'
          destination-repository-name: 'sanjose_server'
          target-branch: 'main'      # <--- PUSHES TO MAIN
          target-directory: 'pb_public'
          commit-message: "Deploy Production: ${{ env.PROD_VER }}"
          user-email: 'bot@gymsystem.com'

  # ==========================================
  # RELEASE & SYNC (Same as before)
  # ==========================================
  release-and-sync:
    needs: deploy-production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.deploy-production.outputs.prod_ver }}
          files: app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Version Manager
        env:
          NEW_PATCH: ${{ needs.deploy-production.outputs.new_patch }}
        run: |
           if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
           RESPONSE=$(curl -s ${{ secrets.VERSION_MANAGER_URL }}/${{ secrets.VERSION_COLLECTION_ID }})
           MAJOR=$(echo $RESPONSE | jq -r '.major')
           MINOR=$(echo $RESPONSE | jq -r '.minor')
           PAYLOAD=$(jq -n --argjson major "$MAJOR" --argjson minor "$MINOR" --argjson patch "$NEW_PATCH" \
             '{major: $major, minor: $minor, patch: $patch}')
           curl -s -X PATCH ${{ secrets.VERSION_MANAGER_URL }}/${{ secrets.VERSION_COLLECTION_ID }} \
             -H "Content-Type: application/json" \
             -H "Authorization: ${{ secrets.PB_TOKEN }}" \
             -d "$PAYLOAD"