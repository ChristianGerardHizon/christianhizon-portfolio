name: Deploy System

on:
  pull_request:
    types: [ closed ]
    branches: [ "staging", "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # REQUIRED for creating GitHub Releases

jobs:
  # ==========================================
  # JOB 1: STAGING TRACK
  # ==========================================
  deploy-staging:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.base_ref == 'staging')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- PREFLIGHT CHECKS ---
      - name: Verify deploy secrets exist
        run: |
          MISSING=""
          if [ -z "${{ secrets.DEPLOY_PAT }}" ]; then MISSING="$MISSING DEPLOY_PAT"; fi
          if [ -z "${{ secrets.VERSION_MANAGER_URL }}" ]; then MISSING="$MISSING VERSION_MANAGER_URL"; fi
          if [ -z "${{ secrets.VERSION_COLLECTION_ID }}" ]; then MISSING="$MISSING VERSION_COLLECTION_ID"; fi
          if [ -z "${{ secrets.POCKETBASE_URL_STAGING }}" ]; then MISSING="$MISSING POCKETBASE_URL_STAGING"; fi
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then MISSING="$MISSING KEYSTORE_BASE64"; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then MISSING="$MISSING KEYSTORE_PASSWORD"; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then MISSING="$MISSING KEY_ALIAS"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then MISSING="$MISSING KEY_PASSWORD"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi

      - name: Verify destination repository is accessible
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/ChristianGerardHizon/sannjose_server")

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cannot access destination repo ChristianGerardHizon/sannjose_server (HTTP $STATUS)."
            echo "::error::Verify that DEPLOY_PAT is valid and has repo access."
            exit 1
          fi
          echo "Destination repository is accessible."

      - name: Verify destination branch exists
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/ChristianGerardHizon/sannjose_server/branches/staging")

          if [ "$STATUS" != "200" ]; then
            echo "::warning::Branch 'staging' not found (HTTP $STATUS). The deploy action will attempt to create it."
          else
            echo "Destination branch 'staging' exists."
          fi
      # --- PREFLIGHT CHECKS END ---

      # --- SETUP & CACHE START ---
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache/hosted
            ~/.pub-cache/git
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: flutter pub get
      # --- SETUP & CACHE END ---

      # ROBUST VERSION CALCULATION
      - name: Calculate Staging Version
        id: calc_staging
        env:
          URL: ${{ secrets.VERSION_MANAGER_URL }}
          ID: ${{ secrets.VERSION_COLLECTION_ID }}
        run: |
          if [ -z "$URL" ] || [ -z "$ID" ]; then
            echo "::error::Secrets VERSION_MANAGER_URL or VERSION_COLLECTION_ID are missing!"
            exit 1
          fi

          RESPONSE=$(curl -s "$URL/$ID")
          MAJOR=$(echo $RESPONSE | jq -r '.major')
          MINOR=$(echo $RESPONSE | jq -r '.minor')
          PATCH=$(echo $RESPONSE | jq -r '.patch')

          if [ "$MAJOR" == "null" ]; then
             echo "::error::Failed to parse version. Response: $RESPONSE"
             exit 1
          fi

          NEXT_PATCH=$((PATCH + 1))
          STAGING_VER="$MAJOR.$MINOR.$NEXT_PATCH-staging"
          STAGING_VER_BASE="$MAJOR.$MINOR.$NEXT_PATCH"

          echo "STAGING_VER=$STAGING_VER" >> $GITHUB_ENV
          echo "STAGING_VER_BASE=$STAGING_VER_BASE" >> $GITHUB_ENV
          echo "Calculated Staging Version: $STAGING_VER"

      - name: Resolve unique staging tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="staging-${{ env.STAGING_VER_BASE }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG")

          if [ "$STATUS" == "200" ]; then
            # Tag exists, append run number to make it unique
            TAG="${TAG}-build.${{ github.run_number }}"
            echo "::notice::Tag already exists, using $TAG instead."
          fi

          echo "STAGING_TAG=$TAG" >> $GITHUB_ENV
          echo "Resolved staging tag: $TAG"

      # DECODE KEYSTORE FOR RELEASE SIGNING
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/android/app/upload-keystore.jks

      # BUILD WEB & APK
      - name: Build Web (WASM)
        run: flutter build web --wasm --release --build-name=${{ env.STAGING_VER }} --build-number=${{ github.run_number }} --dart-define=ENV=staging --dart-define=API_URL=${{ secrets.POCKETBASE_URL_STAGING }}

      - name: Build APK (Release)
        env:
          CI: "true"
          CM_KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          CM_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --build-name=${{ env.STAGING_VER }} --build-number=${{ github.run_number }} --dart-define=ENV=staging --dart-define=API_URL=${{ secrets.POCKETBASE_URL_STAGING }}

      # DEPLOY
      - name: Prepare Folder
        run: mv build/web pb_public

      - name: Deploy to Server Staging
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_PAT }}
        with:
          source-directory: 'pb_public'
          destination-github-username: 'ChristianGerardHizon'
          destination-repository-name: 'sannjose_server'
          target-branch: 'staging'
          target-directory: 'pb_public'
          create-target-branch-if-needed: true
          commit-message: "Deploy Staging: ${{ env.STAGING_VER }}"
          user-email: 'bot@gymsystem.com'

      # RELEASE
      - name: Create Staging Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.STAGING_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.STAGING_TAG }}
          prerelease: true
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # JOB 2: PRODUCTION TRACK
  # ==========================================
  deploy-production:
    if: github.event.pull_request.merged == true && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      prod_ver: ${{ steps.calc_prod.outputs.prod_ver }}
      new_patch: ${{ steps.calc_prod.outputs.new_patch }}
      major: ${{ steps.calc_prod.outputs.major }}
      minor: ${{ steps.calc_prod.outputs.minor }}
      commit_sha: ${{ steps.get_sha.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Capture commit SHA
        id: get_sha
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      # --- PREFLIGHT CHECKS ---
      - name: Verify deploy secrets exist
        run: |
          MISSING=""
          if [ -z "${{ secrets.DEPLOY_PAT }}" ]; then MISSING="$MISSING DEPLOY_PAT"; fi
          if [ -z "${{ secrets.VERSION_MANAGER_URL }}" ]; then MISSING="$MISSING VERSION_MANAGER_URL"; fi
          if [ -z "${{ secrets.VERSION_COLLECTION_ID }}" ]; then MISSING="$MISSING VERSION_COLLECTION_ID"; fi
          if [ -z "${{ secrets.POCKETBASE_URL_PROD }}" ]; then MISSING="$MISSING POCKETBASE_URL_PROD"; fi
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then MISSING="$MISSING KEYSTORE_BASE64"; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then MISSING="$MISSING KEYSTORE_PASSWORD"; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then MISSING="$MISSING KEY_ALIAS"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then MISSING="$MISSING KEY_PASSWORD"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi

      - name: Verify destination repository is accessible
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/ChristianGerardHizon/sannjose_server")

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cannot access destination repo ChristianGerardHizon/sannjose_server (HTTP $STATUS)."
            echo "::error::Verify that DEPLOY_PAT is valid and has repo access."
            exit 1
          fi
          echo "Destination repository is accessible."

      - name: Verify destination branch exists
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/ChristianGerardHizon/sannjose_server/branches/main")

          if [ "$STATUS" != "200" ]; then
            echo "::warning::Branch 'main' not found on destination repo (HTTP $STATUS). Deploy may fail."
          else
            echo "Destination branch 'main' exists."
          fi
      # --- PREFLIGHT CHECKS END ---

      # --- SETUP & CACHE START ---
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache/hosted
            ~/.pub-cache/git
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: flutter pub get
      # --- SETUP & CACHE END ---

      # ROBUST VERSION CALCULATION
      - name: Calculate Prod Version
        id: calc_prod
        env:
          URL: ${{ secrets.VERSION_MANAGER_URL }}
          ID: ${{ secrets.VERSION_COLLECTION_ID }}
        run: |
          if [ -z "$URL" ] || [ -z "$ID" ]; then
            echo "::error::Secrets Missing!"
            exit 1
          fi

          RESPONSE=$(curl -s "$URL/$ID")
          MAJOR=$(echo $RESPONSE | jq -r '.major')
          MINOR=$(echo $RESPONSE | jq -r '.minor')
          PATCH=$(echo $RESPONSE | jq -r '.patch')

          if [ "$MAJOR" == "null" ]; then exit 1; fi

          NEW_PATCH=$((PATCH + 1))
          PROD_VER="$MAJOR.$MINOR.$NEW_PATCH"

          echo "PROD_VER=$PROD_VER" >> $GITHUB_ENV
          echo "prod_ver=$PROD_VER" >> $GITHUB_OUTPUT
          echo "new_patch=$NEW_PATCH" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      # DECODE KEYSTORE FOR RELEASE SIGNING
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/android/app/upload-keystore.jks

      # BUILD WEB & APK
      - name: Build Web
        run: flutter build web --release --build-name=${{ env.PROD_VER }} --build-number=${{ github.run_number }} --dart-define=ENV=prod --dart-define=API_URL=${{ secrets.POCKETBASE_URL_PROD }}

      - name: Build APK (Release)
        env:
          CI: "true"
          CM_KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          CM_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --build-name=${{ env.PROD_VER }} --build-number=${{ github.run_number }} --dart-define=ENV=prod --dart-define=API_URL=${{ secrets.POCKETBASE_URL_PROD }}

      # UPLOAD & DEPLOY
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Prepare Folder
        run: mv build/web pb_public

      - name: Deploy to Server Main
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_PAT }}
        with:
          source-directory: 'pb_public'
          destination-github-username: 'ChristianGerardHizon'
          destination-repository-name: 'sannjose_server'
          target-branch: 'main'
          target-directory: 'pb_public'
          commit-message: "Deploy Production: ${{ env.PROD_VER }}"
          user-email: 'bot@gymsystem.com'

  # ==========================================
  # JOB 3: RELEASE & SYNC
  # ==========================================
  release-and-sync:
    needs: deploy-production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.deploy-production.outputs.prod_ver }}
          target_commitish: ${{ needs.deploy-production.outputs.commit_sha }}
          name: "v${{ needs.deploy-production.outputs.prod_ver }}"
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Version Manager
        env:
          NEW_PATCH: ${{ needs.deploy-production.outputs.new_patch }}
          MAJOR: ${{ needs.deploy-production.outputs.major }}
          MINOR: ${{ needs.deploy-production.outputs.minor }}
          URL: ${{ secrets.VERSION_MANAGER_URL }}
          ID: ${{ secrets.VERSION_COLLECTION_ID }}
          TOKEN: ${{ secrets.PB_TOKEN }}
        run: |
           PAYLOAD=$(jq -n --argjson major "$MAJOR" --argjson minor "$MINOR" --argjson patch "$NEW_PATCH" \
             '{major: $major, minor: $minor, patch: $patch}')

           if [ -z "$TOKEN" ]; then
              curl -s -X PATCH "$URL/$ID" -H "Content-Type: application/json" -d "$PAYLOAD"
           else
              curl -s -X PATCH "$URL/$ID" -H "Content-Type: application/json" -H "Authorization: $TOKEN" -d "$PAYLOAD"
           fi
