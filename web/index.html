<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Christian Hizon">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Christian Hizon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2">

  <title>Christian Hizon</title>
  <link rel="manifest" href="manifest.json">

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <!-- Google Fonts: Inter (matches Flutter app) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #FFFFFF;
      overflow: hidden;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #FFFFFF;
      transition: opacity 0.4s ease-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Icon */
    .splash-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(2, 86, 155, 0.15);
      animation: icon-enter 0.6s ease-out both;
    }

    @keyframes icon-enter {
      from { opacity: 0; transform: scale(0.8) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Name */
    .splash-name {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #0F172A;
      animation: text-enter 0.5s ease-out 0.2s both;
    }

    /* Tagline */
    .splash-tagline {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #94A3B8;
      letter-spacing: 0.5px;
      animation: text-enter 0.5s ease-out 0.35s both;
    }

    @keyframes text-enter {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Loading bar container */
    .splash-loader {
      margin-top: 32px;
      width: 180px;
      height: 3px;
      background: #E2E8F0;
      border-radius: 3px;
      overflow: hidden;
      animation: text-enter 0.5s ease-out 0.5s both;
    }

    /* Animated gradient bar */
    .splash-loader-bar {
      width: 40%;
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #02569B, #38BDF8);
      animation: loader-slide 1.2s ease-in-out infinite;
    }

    @keyframes loader-slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
  </style>

  <script>
    function removeSplashFromWeb() {
      var splash = document.getElementById("splash-screen");
      if (splash) {
        splash.classList.add("fade-out");
        setTimeout(function() { splash.remove(); }, 400);
      }
    }
  </script>
</head>
<body>
  <!-- Custom splash screen -->
  <div id="splash-screen">
    <img class="splash-icon" src="icons/Icon-192.png" alt="Christian Hizon">
    <div class="splash-name">CHRISTIAN HIZON</div>
    <div class="splash-tagline">Flutter Developer</div>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>

  <script>
    {{flutter_bootstrap_js}}
  </script>
</body>
</html>
