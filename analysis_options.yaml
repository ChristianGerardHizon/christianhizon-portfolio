linter:
  rules:

analyzer:
  plugins:
    - custom_lint
  errors:
    invalid_annotation_target: ignore
  exclude:
    - '**/_index.dart'
    - '**.freezed.dart'
    - '**.g.dart'
    - '**.gr.dart'
    - '**.mapper.dart'
    - '**.gen.dart'
    - '**/generated_plugin_registrant.dart'
custom_lint:
  enable_all_lint_rules: true